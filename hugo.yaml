baseURL: "https://blog.mikehacker.net/"
languageCode: "en-us"
title: "Mike Hacker"
theme: "hugo-theme-stack"

defaultContentLanguage: en
hasCJKLanguage: false

pagination:
  pagerSize: 10

permalinks:
  post: "/p/:slug/"
  page: "/:slug/"

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  tag: tags
  category: categories

enableRobotsTXT: true
buildDrafts: false

minify:
  disableXML: true
  minifyOutput: true

related:
  includeNewer: true
  threshold: 60
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 200

markup:
  goldmark:
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - ["\\[", "\\]"]
            - ["$$", "$$"]
          inline:
            - ["\\(", "\\)"]
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 4
    ordered: true
    startLevel: 2
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNoStart: 1
    lineNos: true
    lineNumbersInTable: true
    tabWidth: 4

params:
  mainSections:
    - post
  rssFullContent: true

  footer:
    since: 2024
    customText: "Azure Specialist · Microsoft"

  dateFormat:
    published: "Jan 02, 2006"
    lastUpdated: "Jan 02, 2006"

  sidebar:
    emoji: ""
    subtitle: "Azure insights for US State & Local Government"
    avatar: "img/avatar.svg"
    compact: false

  article:
    headingAnchor: false
    math: false
    toc: true
    readingTime: true
    list:
      showTags: true
    license:
      enabled: false

  widgets:
    homepage:
      - type: search
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 15
    page:
      - type: toc

  colorScheme:
    toggle: true
    default: "dark"

  imageProcessing:
    autoOrient: false
    content:
      widths: [800, 1600, 2400]
      enabled: true
    thumbnail:
      enabled: true

  comments:
    enabled: false

  cookies:
    enabled: false

  socialIcons:
    - name: linkedin
      url: "https://linkedin.com/in/mphacker/"
    - name: github
      url: "https://github.com/mhackermsft"

menu:
  social:
    - identifier: linkedin
      name: LinkedIn
      url: "https://linkedin.com/in/mphacker/"
      params:
        icon: brand-linkedin
    - identifier: github
      name: GitHub
      url: "https://github.com/mhackermsft"
      params:
        icon: brand-github
